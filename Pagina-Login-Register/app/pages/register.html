<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro
    </title>
    <link rel="stylesheet" href="/style.css">
    <script src="/register.js" defer></script>
</head>
<body>

    <main>
        <div class="form-container">
            <form>
                <h1>Registra tu cuenta</h1>
                <p>Ingresa tus datos para poder crear una cuenta</p>
                <label for="user" class="sr-only">Ingresar su nombre: </label>
                <input type="text" placeholder="Jose Martinez" maxlength="50" required name="user" id="user">
                <label for="Email" class="sr-only">Ingresar Correo Electronico: </label>
                <input type="text" placeholder="Ingresa tu correo Electronico " maxlength="50" required>
                <label for="password" class="sr-only">Ingresar contraseña: </label>
                <input type="password" placeholder="Contraseña" maxlength="15" required>
                
                <button type="submit">Registrarse</button>
                <p class="error escondido">Error al registrar sus datos</p>
            </form>
            <p>¿Ya tienes cuenta?<a href="/login">Iniciar Sesion</a></p>

        </div>
    </main>



</body>
</html>
